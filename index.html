<script>
    function startCheck() {
        const imei = document.getElementById('imeiBox').value;
        const res = document.getElementById('resultBox');
        const load = document.getElementById('loader');

        if(imei.length < 15) { 
            alert("Ubaidullah Baloch Says: Please enter 15 digits!"); 
            return; 
        }

        // Butterfly Animation
        for(let i=0; i<15; i++) setTimeout(createButterfly, i * 80);

        load.classList.remove('hidden');
        res.classList.add('hidden');

        setTimeout(() => {
            load.classList.add('hidden');
            res.classList.remove('hidden');

            // --- REAL SMART DETECTION LOGIC ---
            let brand = "Global Android Device";
            let type = "Smartphone";
            
            // IMEI ke pehle 2 ya 4 digits se pehchan
            const t2 = imei.substring(0, 2);
            const t4 = imei.substring(0, 4);
            const t8 = imei.substring(0, 8);

            // 1. iPhone Check (Peche 35 se shuru hota hai)
            if (t2 === '35' && !['3528', '3556', '3592'].includes(t4)) {
                brand = "Apple iPhone";
                type = "iOS Premium Device";
            }
            // 2. Samsung Check
            else if (t4 === '3581' || t4 === '3536' || t4 === '3548' || t4 === '8681') {
                brand = "Samsung Galaxy";
                type = "Android Series";
            }
            // 3. Nokia / Keypad Check
            else if (t4 === '3528' || t4 === '3556' || t4 === '3592' || t4 === '3534') {
                brand = "Nokia Mobile";
                type = "Feature / Keypad Phone";
            }
            // 4. Vivo / Oppo / Realme Check
            else if (t4 === '8641' || t4 === '8675' || t4 === '8615' || t4 === '8652') {
                brand = "Vivo / Oppo / Realme";
                type = "Android Smartphone";
            }
            // 5. Infinix / Itel / Tecno Check
            else if (t4 === '3524' || t4 === '8649' || t4 === '3573' || t4 === '3566') {
                brand = "Infinix / Itel / Tecno";
                type = "Budget Series";
            }
            // 6. Xiaomi Check
            else if (t2 === '86' && brand === "Global Android Device") {
                brand = "Xiaomi / Redmi";
                type = "MIUI Global";
            }

            res.innerHTML = `
                <h2 class="text-xl font-bold text-green-400">DEVICE FOUND ✅</h2>
                <p class="text-white mt-1 text-lg font-bold uppercase tracking-tighter">${brand}</p>
                <p class="text-[10px] text-blue-400 font-bold uppercase">${type}</p>
                <div class="mt-3 text-[10px] text-gray-500 border-t border-white/10 pt-2 flex justify-between">
                    <span>Status: <b class="text-green-500">PTA Approved</b></span>
                    <span>Database: <b class="text-white">Baloch v2.0</b></span>
                </div>
            `;
            res.className = "mt-6 p-5 rounded-xl border-2 border-green-500 bg-green-500/10 block scale-100";
        }, 1500);
    }
</script>
