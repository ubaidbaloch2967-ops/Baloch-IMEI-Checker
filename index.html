<script>
    function startCheck() {
        const imei = document.getElementById('imeiBox').value;
        const res = document.getElementById('resultBox');
        const load = document.getElementById('loader');

        if(imei.length !== 15) { 
            alert("Ubaidullah Baloch Says: Please enter 15 digits!"); 
            return; 
        }

        // Butterfly Animation
        for(let i=0; i<15; i++) setTimeout(createButterfly, i * 80);

        load.classList.remove('hidden');
        res.classList.add('hidden');

        setTimeout(() => {
            load.classList.add('hidden');
            res.classList.remove('hidden');

            let brand = "Global Android Device";
            let type = "Smartphone";
            
            const t4 = imei.substring(0, 4); // Pehle 4 digits
            const t2 = imei.substring(0, 2); // Pehle 2 digits

            // 1. Sabse pehle Nokia/Keypad check karein (kyunke ye 35 se shuru ho sakte hain)
            if (['3528', '3556', '3592', '3534', '3566'].includes(t4)) {
                brand = "Nokia / Keypad Phone";
                type = "Classic Feature Phone";
            }
            // 2. Samsung Check
            else if (['3581', '3536', '3548', '8681', '3572'].includes(t4)) {
                brand = "Samsung Galaxy";
                type = "Android Series";
            }
            // 3. Infinix / Itel / Tecno Check
            else if (['3524', '8649', '3573', '8613'].includes(t4)) {
                brand = "Infinix / Itel / Tecno";
                type = "Smart/Keypad Series";
            }
            // 4. Vivo / Oppo / Realme
            else if (['8641', '8675', '8615', '8652'].includes(t4)) {
                brand = "Vivo / Oppo / Realme";
                type = "Android Smartphone";
            }
            // 5. Agar upar kuch match na ho aur 35 se shuru ho, tab iPhone kahega
            else if (t2 === '35') {
                brand = "Apple iPhone";
                type = "iOS Premium";
            }
            // 6. Xiaomi Check
            else if (t2 === '86') {
                brand = "Xiaomi / Redmi";
                type = "Android Global";
            }

            res.innerHTML = `
                <h2 class="text-xl font-bold text-green-400">DEVICE IDENTIFIED ✅</h2>
                <p class="text-white mt-1 text-lg font-bold uppercase">${brand}</p>
                <p class="text-[10px] text-blue-400 font-bold">${type}</p>
                <div class="mt-3 text-[10px] text-gray-500 border-t border-white/10 pt-2 flex justify-between">
                    <span>Status: <b class="text-green-500">PTA Approved</b></span>
                    <span>Verified by: <b class="text-white">Baloch</b></span>
                </div>
            `;
            res.className = "mt-6 p-5 rounded-xl border-2 border-green-500 bg-green-500/10 block scale-100";
        }, 1500);
    }
</script>
