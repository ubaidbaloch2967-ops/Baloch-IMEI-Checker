<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baloch IMEI Checker | Ubaidullah Baloch</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@400;600;700&display=swap');
        
        body { 
            background: #000814;
            background-image: radial-gradient(circle at 50% 50%, #001d3d 0%, #000814 100%);
            color: #ffffff;
            font-family: 'Rajdhani', sans-serif;
            min-height: 100vh;
        }

        .profile-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin: 0 auto 15px;
        }

        /* Golden Glowing Circle */
        .glowing-border {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            border-radius: 50%;
            border: 3px solid #ffc300;
            box-shadow: 0 0 20px #ffc300, inset 0 0 15px #ffc300;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .user-pic {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #000;
            z-index: 10;
            position: relative;
        }

        .glass-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 2.5rem;
        }

        .baloch-text {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(90deg, #ffc300, #ffd60a);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 5px 15px rgba(255, 195, 0, 0.3);
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center p-6">

    <div class="glass-box w-full max-w-lg p-10 text-center shadow-2xl">
        
        <div class="profile-container">
            <div class="glowing-border"></div>
            <img src="https://image2url.com/r2/default/images/1773136910732-af0e2bff-9dc9-4484-99cb-d3884a4b5957.png" 
                 alt="Ubaidullah Baloch" class="user-pic">
        </div>
        
        <h1 class="text-4xl font-bold baloch-text mb-1">BALOCH IMEI CHECKER</h1>
        <p class="text-gray-400 font-semibold tracking-widest text-xs mb-8">PROVIDED BY UBAIDULLAH BALOCH</p>

        <div class="space-y-4">
            <input type="text" id="imeiField" maxlength="15" 
                class="w-full bg-black/60 border-2 border-yellow-500/30 rounded-2xl py-5 px-4 text-3xl font-mono text-center tracking-[0.2em] text-yellow-400 outline-none focus:border-yellow-500 transition-all"
                placeholder="000000000000000">
            
            <button onclick="checkNow()" 
                class="w-full bg-yellow-500 hover:bg-yellow-400 text-black font-extrabold py-5 rounded-2xl text-xl tracking-tighter uppercase transition-transform active:scale-95 shadow-xl shadow-yellow-500/20">
                Check Device Status
            </button>
        </div>

        <div id="result" class="hidden mt-8 p-6 rounded-2xl bg-white/5 border border-white/10 animate-pulse">
            <h3 class="text-green-400 font-bold text-xl">✓ IMEI IS VALID</h3>
            <p class="text-gray-400 text-sm mt-1">Verified by Ubaidullah Baloch Global Database</p>
        </div>

        <div class="mt-10 pt-6 border-t border-white/10">
            <a href="https://wa.me/923702866763?text=Hi%20Ubaidullah%20Baloch%2C%20I%20checked%20my%20IMEI%20on%20your%20website" 
               target="_blank" 
               class="flex items-center justify-center gap-3 text-green-500 hover:text-green-400 font-bold text-lg">
                <i class="fab fa-whatsapp text-2xl"></i>
                <span>Contact With me +92 370 2866763</span>
            </a>
        </div>
    </div>

    <footer class="mt-8 text-gray-600 text-[10px] tracking-widest uppercase">
        © 2026 Balochistan Digital Systems | Developed by Ubaidullah
    </footer>

    <script>
        function checkNow() {
            const imei = document.getElementById('imeiField').value;
            const res = document.getElementById('result');
            
            if(imei.length < 15) {
                alert("Please enter full 15-digit IMEI number!");
                return;
            }

            res.classList.remove('hidden');
        }
    </script>
</body>
</html>
