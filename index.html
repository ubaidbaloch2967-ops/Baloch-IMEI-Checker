<script>
    function checkIMEI() {
        const imei = document.getElementById('imeiBox').value;
        const res = document.getElementById('resultBox');
        const load = document.getElementById('loadParent');

        if(imei.length < 15) { alert("Dost, 15 digits poore likho!"); return; }

        // Butterflies Effect
        for(let i=0; i<15; i++) setTimeout(createButterfly, i * 100);

        load.classList.remove('hidden');
        res.classList.add('hidden');

        setTimeout(() => {
            load.classList.add('hidden');
            res.classList.remove('hidden');

            // --- SMART BRAND DETECTION LOGIC ---
            let brand = "Global Android Device";
            let status = "Clean / Verified";
            const tac2 = imei.substring(0, 2);
            const tac4 = imei.substring(0, 4);

            if (tac2 === '35') brand = "iPhone / Apple Inc.";
            else if (tac4 === '8681' || tac4 === '8634') brand = "Samsung Galaxy";
            else if (tac4 === '8641' || tac4 === '8652') brand = "Vivo Mobile";
            else if (tac4 === '8675' || tac4 === '8620') brand = "Oppo / Realme";
            else if (tac4 === '8649' || tac4 === '3524') brand = "Infinix / Tecno";
            else if (tac2 === '91') brand = "Huawei / Honor";
            else if (tac2 === '86') brand = "Xiaomi / Redmi";
            
            res.innerHTML = `
                <h2 class="text-xl font-bold text-green-400 italic">DEVICE FOUND ✅</h2>
                <p class="text-white mt-1 text-lg font-bold uppercase tracking-tight">${brand}</p>
                <div class="flex justify-between mt-3 text-[10px] text-gray-400 border-t border-white/10 pt-2">
                    <span>Status: <b class="text-blue-400">Clean</b></span>
                    <span>Region: <b class="text-blue-400">Global</b></span>
                </div>
                <p class="text-[9px] text-yellow-600 mt-2 font-bold">BALOCH SYSTEM VERIFIED</p>
            `;
            res.className = "mt-6 p-5 rounded-xl border-2 border-green-500 bg-green-500/10 block animate-pulse";
        }, 1200);
    }
</script>
