    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Rajdhani:wght@600&display=swap');
        body { background: #000; color: #fff; font-family: 'Rajdhani', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; margin: 0; overflow-x: hidden; }

            animation: spinRing 2s linear infinite; filter: drop-shadow(0 0 8px #00f2ff);
        }

        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px); border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); width: 92%; max-width: 380px; padding: 30px; text-align: center; }
